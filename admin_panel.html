<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sellvance Admin — Auto-Improvement</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f0f1e;color:#e8e8f0;min-height:100vh;padding:24px;}
.container{max-width:1400px;margin:0 auto;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;padding-bottom:16px;border-bottom:1px solid #2a2a3e;}
.header h1{font-size:24px;font-weight:800;background:linear-gradient(135deg,#6c63ff,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.refresh-btn{background:#6c63ff;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-weight:600;cursor:pointer;font-size:13px;}
.refresh-btn:hover{background:#5a52e0;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:20px;margin-bottom:24px;}
.card{background:#1a1a2e;border:1px solid #2a2a3e;border-radius:14px;padding:20px;}
.card-title{font-size:14px;font-weight:700;color:#6c63ff;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:12px;}
.kpi{background:#0f0f1e;padding:14px;border-radius:10px;}
.kpi-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.kpi-value{font-size:22px;font-weight:800;color:#fff;}
.kpi-sub{font-size:11px;color:#10b981;margin-top:2px;}
.flag-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #2a2a3e;}
.flag-row:last-child{border-bottom:none;}
.flag-name{font-weight:600;font-size:13px;}
.flag-desc{font-size:11px;color:#888;margin-top:2px;}
.flag-controls{display:flex;align-items:center;gap:8px;}
.toggle{position:relative;width:40px;height:22px;background:#2a2a3e;border-radius:12px;cursor:pointer;transition:background .2s;}
.toggle.on{background:#10b981;}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .2s;}
.toggle.on::after{transform:translateX(18px);}
.pct-input{width:50px;padding:4px 6px;background:#0f0f1e;border:1px solid #2a2a3e;color:#fff;border-radius:6px;font-size:12px;text-align:center;}
.insight{background:#0f0f1e;padding:12px;border-radius:10px;margin-bottom:10px;border-left:3px solid #6c63ff;}
.insight.critical{border-left-color:#ef4444;}
.insight.warning{border-left-color:#f59e0b;}
.insight.opportunity{border-left-color:#10b981;}
.insight-title{font-size:13px;font-weight:700;margin-bottom:4px;}
.insight-desc{font-size:11px;color:#aaa;line-height:1.5;}
.insight-rec{font-size:11px;color:#6c63ff;margin-top:6px;font-style:italic;}
.status-badge{display:inline-block;padding:2px 8px;font-size:10px;border-radius:10px;font-weight:700;text-transform:uppercase;}
.status-ok{background:#10b98133;color:#10b981;}
.status-degraded{background:#f59e0b33;color:#f59e0b;}
.action-btn{background:#2a2a3e;color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;margin-right:6px;}
.action-btn:hover{background:#3a3a5e;}
.action-btn.primary{background:#6c63ff;}
.empty{text-align:center;color:#666;padding:20px;font-size:13px;}
.event-row{font-family:'Consolas','Monaco',monospace;font-size:11px;color:#aaa;padding:4px 0;border-bottom:1px solid #1f1f33;}
.event-row .method{color:#6c63ff;font-weight:700;}
.event-row .path{color:#fff;}
.event-row .duration{color:#10b981;}
.event-row .status-500{color:#ef4444;}
.event-row .status-200{color:#10b981;}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🎛️ Sellvance Admin — Auto-Improvement</h1>
    <button class="refresh-btn" onclick="loadAll()">🔄 Atualizar</button>
  </div>

  <div class="grid">
    <!-- HEALTH STATUS -->
    <div class="card">
      <div class="card-title">💚 Status do Sistema</div>
      <div id="health-content" class="empty">Carregando...</div>
    </div>

    <!-- PRICING AI STATS -->
    <div class="card">
      <div class="card-title">💰 Pricing AI</div>
      <div id="pricing-content" class="empty">Carregando...</div>
      <button class="action-btn primary" onclick="runPricingBatch()">▶️ Rodar Batch Agora</button>
    </div>

    <!-- FEATURE FLAGS -->
    <div class="card" style="grid-column:span 2;">
      <div class="card-title">🚩 Feature Flags</div>
      <div id="flags-content" class="empty">Carregando...</div>
    </div>

    <!-- INSIGHTS -->
    <div class="card" style="grid-column:span 2;">
      <div class="card-title">🧠 Auto Insights (IA da plataforma)</div>
      <div id="insights-content" class="empty">Carregando...</div>
      <button class="action-btn primary" onclick="runInsights()">🔍 Rodar Analise Agora</button>
    </div>

    <!-- RECENT EVENTS -->
    <div class="card" style="grid-column:span 2;">
      <div class="card-title">📡 Telemetria em Tempo Real</div>
      <div id="events-content" class="empty">Carregando...</div>
    </div>
  </div>
</div>

<script>
async function fetchJson(url, opts){
  const r = await fetch(url, opts);
  return r.json();
}

async function loadHealth(){
  try {
    const d = await fetchJson('/healthz/deep');
    const el = document.getElementById('health-content');
    const statusClass = d.status === 'ok' ? 'status-ok' : 'status-degraded';
    el.innerHTML = `
      <div class="kpi-grid">
        <div class="kpi">
          <div class="kpi-label">Status</div>
          <div class="kpi-value"><span class="status-badge ${statusClass}">${d.status}</span></div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Error Rate (5min)</div>
          <div class="kpi-value">${(d.checks.error_rate?.rate * 100 || 0).toFixed(2)}%</div>
          <div class="kpi-sub">${d.checks.error_rate?.errors || 0} / ${d.checks.error_rate?.total || 0} reqs</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Database</div>
          <div class="kpi-value">${d.checks.database === 'ok' ? '✅' : '❌'}</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Syncs Parados</div>
          <div class="kpi-value">${d.checks.stale_syncs || 0}</div>
        </div>
      </div>
    `;
  } catch (e) {
    document.getElementById('health-content').innerHTML = '<div class="empty">Erro ao carregar</div>';
  }
}

async function loadPricing(){
  try {
    const d = await fetchJson('/admin/pricing/stats');
    const s = d.stats || {};
    document.getElementById('pricing-content').innerHTML = `
      <div class="kpi-grid">
        <div class="kpi">
          <div class="kpi-label">Regras Ativas</div>
          <div class="kpi-value">${s.total_rules || 0}</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Auto-apply ON</div>
          <div class="kpi-value">${s.auto_enabled || 0}</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Mudancas 24h</div>
          <div class="kpi-value">${s.changes_24h || 0}</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Delta Medio 7d</div>
          <div class="kpi-value">${s.avg_delta_7d || 0}%</div>
        </div>
      </div>
    `;
  } catch (e) {
    document.getElementById('pricing-content').innerHTML = '<div class="empty">Erro ao carregar</div>';
  }
}

async function loadFlags(){
  try {
    const d = await fetchJson('/admin/flags');
    const el = document.getElementById('flags-content');
    if (!d.flags || !d.flags.length){
      el.innerHTML = '<div class="empty">Nenhuma flag configurada</div>';
      return;
    }
    el.innerHTML = d.flags.map(f => `
      <div class="flag-row">
        <div>
          <div class="flag-name">${f.flag_name}</div>
          <div class="flag-desc">${f.description || ''}</div>
        </div>
        <div class="flag-controls">
          <input type="number" class="pct-input" min="0" max="100" value="${f.rollout_pct || 0}"
                 onchange="updateFlag('${f.flag_name}', null, this.value)">
          <div class="toggle ${f.enabled ? 'on' : ''}"
               onclick="updateFlag('${f.flag_name}', ${f.enabled ? 0 : 1}, null)"></div>
        </div>
      </div>
    `).join('');
  } catch (e) {
    document.getElementById('flags-content').innerHTML = '<div class="empty">Erro ao carregar</div>';
  }
}

async function loadInsights(){
  try {
    const d = await fetchJson('/admin/insights');
    const el = document.getElementById('insights-content');
    if (!d.insights || !d.insights.length){
      el.innerHTML = '<div class="empty">Nenhum insight pendente — sistema saudavel ✨</div>';
      return;
    }
    el.innerHTML = d.insights.map(i => `
      <div class="insight ${i.severity}">
        <div class="insight-title">${i.title}</div>
        <div class="insight-desc">${i.description || ''}</div>
        <div class="insight-rec">💡 ${i.recommendation || ''}</div>
      </div>
    `).join('');
  } catch (e) {
    document.getElementById('insights-content').innerHTML = '<div class="empty">Erro ao carregar</div>';
  }
}

async function loadEvents(){
  try {
    const d = await fetchJson('/admin/telemetry/events?limit=30');
    const el = document.getElementById('events-content');
    if (!d.events || !d.events.length){
      el.innerHTML = '<div class="empty">Nenhum evento registrado</div>';
      return;
    }
    el.innerHTML = d.events.map(e => {
      const statusCls = e.status_code >= 500 ? 'status-500' : 'status-200';
      return `<div class="event-row">
        <span class="method">${e.event_name || ''}</span>
        <span class="path">${e.page || ''}</span>
        <span class="duration">${e.duration_ms || 0}ms</span>
        <span class="${statusCls}">${e.status_code || ''}</span>
        <span style="color:#555;">${e.created_at || ''}</span>
      </div>`;
    }).join('');
  } catch (e) {
    document.getElementById('events-content').innerHTML = '<div class="empty">Erro ao carregar</div>';
  }
}

async function updateFlag(name, enabled, rollout_pct){
  const body = {};
  if (enabled !== null) body.enabled = enabled;
  if (rollout_pct !== null) body.rollout_pct = parseInt(rollout_pct);
  await fetch(`/admin/flags/${name}`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  loadFlags();
}

async function runInsights(){
  await fetch('/admin/insights/run', {method: 'POST'});
  setTimeout(loadInsights, 500);
}

async function runPricingBatch(){
  const r = await fetch('/admin/pricing/run-batch', {method: 'POST'});
  const d = await r.json();
  alert('Batch executado: ' + JSON.stringify(d.result));
  loadPricing();
}

function loadAll(){
  loadHealth();
  loadPricing();
  loadFlags();
  loadInsights();
  loadEvents();
}

loadAll();
setInterval(loadEvents, 10000);  // eventos em tempo real a cada 10s
setInterval(loadHealth, 30000);  // health a cada 30s
</script>
</body>
</html>
