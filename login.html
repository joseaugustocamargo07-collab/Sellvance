<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sellvance – Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #060608;
      --surface:   #111116;
      --surface2:  #18181f;
      --border:    rgba(255,255,255,.07);
      --accent:    #6c63ff;
      --accent-h:  #857cff;
      --text:      #e8e8f0;
      --muted:     #6b6b80;
      --error-bg:  rgba(239,68,68,.12);
      --error-bd:  rgba(239,68,68,.35);
      --error-tx:  #f87171;
      --radius:    12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* subtle grid overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(108,99,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(108,99,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* glow blob */
    body::after {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(108,99,255,.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 40px 40px;
      box-shadow:
        0 0 0 1px rgba(108,99,255,.06),
        0 32px 80px rgba(0,0,0,.55);
    }

    /* ── branding ── */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .brand-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent) 0%, #a78bfa 100%);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; color: #fff;
      letter-spacing: -1px;
      box-shadow: 0 4px 16px rgba(108,99,255,.4);
    }

    .brand-name {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #e8e8f0 0%, #a8a8c0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .heading {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
      margin-bottom: 6px;
    }

    .subheading {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* ── error banner ── */
    .error-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--error-bg);
      border: 1px solid var(--error-bd);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 20px;
      font-size: 13.5px;
      color: var(--error-tx);
      line-height: 1.4;
    }

    .error-banner svg { flex-shrink: 0; }

    /* ── form ── */
    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 7px;
      letter-spacing: 0.2px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 14.5px;
      color: var(--text);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,.18);
    }

    input::placeholder { color: var(--muted); opacity: .7; }

    /* ── button ── */
    .btn-primary {
      width: 100%;
      margin-top: 8px;
      background: linear-gradient(135deg, var(--accent) 0%, #857cff 100%);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: opacity .18s, transform .18s, box-shadow .18s;
      box-shadow: 0 4px 18px rgba(108,99,255,.35);
    }

    .btn-primary:hover {
      opacity: .92;
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(108,99,255,.45);
    }

    .btn-primary:active { transform: translateY(0); opacity: 1; }

    /* ── footer ── */
    .card-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted);
    }

    .card-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .card-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">

      <div class="brand">
        <div class="brand-icon">S</div>
        <span class="brand-name">Sellvance</span>
      </div>

      <h1 class="heading">Bem-vindo de volta</h1>
      <p class="subheading">Entre com suas credenciais para continuar</p>

      {% if error %}
      <div class="error-banner">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login" autocomplete="on">
        <div class="field">
          <label for="email">E-mail</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="voce@empresa.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="field">
          <label for="password">Senha</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          />
        </div>

        <button type="submit" class="btn-primary">Entrar</button>
      </form>

      <div class="card-footer">
        Problemas para acessar? <a href="mailto:suporte@sellvance.com.br">Fale com o suporte</a>
      </div>

    </div>
  </div>
</body>
</html>
